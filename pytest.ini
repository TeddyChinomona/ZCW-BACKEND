[pytest]
# Add the --flake8 or --pep8 flag so it runs automatically with 'pytest'
addopts = --flake8

# Ignore specific codes globally
flake8-ignore =
    E501  # Line too long (often considered non-serious if just over limit)
    E226  # Missing whitespace around arithmetic operator (not always enforced)
    E241  # Multiple spaces after ',' (sometimes used for visual alignment)
    W503  # Line break before binary operator (standard changed, now preferred)
    E302  # Expected 2 blank lines
    E265  # Block comment start with '# '
    W292  # No newline at end of file
    E231  # Missing whitespace after ','
    E221  # Multiple spaces before operator
    F403  # 'from module import *' used
    F811  # Redefinition of unused variable
    F401  # Imported but unused
    W293
    E261
    F405
    E402
    W291
    W504
    E261
    E272
    E305
    # File specific
    *.py E201
    docs/conf.py ALL
